name: AegisPay AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (NestJS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install backend deps
        run: cd apps/api && pnpm install
      - name: Lint backend
        run: cd apps/api && pnpm lint || true
      - name: Build backend
        run: cd apps/api && pnpm build
        env:
          MONGODB_URI: mongodb://localhost:27017/aegispay_test
          JWT_SECRET: test_secret_key
          JWT_REFRESH_SECRET: test_refresh_secret

  # ─── Frontend Tests ───────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install frontend deps
        run: cd apps/web && pnpm install
      - name: Lint frontend
        run: cd apps/web && pnpm lint || true
      - name: Build frontend
        run: cd apps/web && pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

  # ─── AI Service Tests ─────────────────────────────────────────────────
  ai-service-test:
    name: AI Service Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: cd apps/ai-service && pip install -r requirements.txt
      - name: Check syntax
        run: cd apps/ai-service && python -m py_compile main.py routers/fraud.py routers/trust.py routers/dispute.py routers/insurance.py
        
  # ─── Security Scan ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
        continue-on-error: true
